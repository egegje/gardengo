<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#151914">
<meta name="robots" content="noindex,nofollow">
<title>GardenGo · Редактор сайта</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
<div id="app"></div>

<!-- editor toolbar -->
<div id="gg-bar">
  <span style="font:700 14px Manrope;color:#fff;">✎ Редактор</span>
  <span id="gg-status" class="dot">● сохранено</span>
  <span class="sp"></span>
  <button class="b-ghost" id="gg-reset" title="Отменить несохранённые правки">Отменить</button>
  <button class="b-save" id="gg-save">Сохранить</button>
</div>

<!-- image picker -->
<div class="gg-modal" id="gg-img-modal">
  <div class="card">
    <h3>Заменить фото</h3>
    <label>Загрузить с устройства</label>
    <input type="file" id="gg-img-file" accept="image/*">
    <label>…или вставить ссылку на изображение</label>
    <input type="url" id="gg-img-url" placeholder="https://…">
    <div class="row">
      <button class="ok" id="gg-img-ok">Применить</button>
      <button class="cancel" id="gg-img-cancel">Отмена</button>
    </div>
    <small>Загруженный файл встраивается прямо в сайт. Для тяжёлых фото лучше вставлять ссылку.</small>
  </div>
</div>

<div class="gg-toast" id="gg-toast"></div>

<script src="app.js?v=7"></script>
<script>
(() => {
  "use strict";
  // Публикация настраивается ОДИН раз: впишите token — и «Сохранить» сразу обновляет сайт для всех.
  // Пусто = «Сохранить» хранит правки только в этом браузере (черновик).
  const PUBLISH = { token: '', repo: 'egegje/gardengo', branch: 'main', path: 'content.json' };

  const $ = (id) => document.getElementById(id);
  const status = $('gg-status');
  let dirty = false;

  const toast = (msg) => {
    const t = $('gg-toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 2600);
  };
  const markClean = () => { dirty = false; status.textContent = '● сохранено'; status.classList.remove('dirty'); };
  const markDirty = () => { dirty = true; status.textContent = '● есть несохранённые правки'; status.classList.add('dirty'); };
  const saveDraft = () => { localStorage.setItem('gg_draft', JSON.stringify(GG.content)); };

  // ---- image picker (для замены фото) ----
  let imgPath = null;
  const openImg = (path) => { imgPath = path; $('gg-img-file').value=''; $('gg-img-url').value=''; $('gg-img-modal').classList.add('open'); };
  const closeImg = () => $('gg-img-modal').classList.remove('open');
  const setImg = (path, val) => {
    const keys = path.split('.'); let o = GG.content;
    for (let i=0;i<keys.length-1;i++) o = o[keys[i]];
    o[keys[keys.length-1]] = val;
    document.querySelectorAll(`.gimg[data-imgpath="${CSS.escape(path)}"]`).forEach(img => img.src = val);
    saveDraft(); markDirty();
  };
  $('gg-img-ok').addEventListener('click', () => {
    const url = $('gg-img-url').value.trim();
    const file = $('gg-img-file').files[0];
    if (file){
      const fr = new FileReader();
      fr.onload = () => { setImg(imgPath, fr.result); closeImg(); toast('Фото заменено — не забудьте «Сохранить»'); };
      fr.readAsDataURL(file);
    } else if (url){ setImg(imgPath, url); closeImg(); toast('Фото заменено — не забудьте «Сохранить»'); }
    else closeImg();
  });
  $('gg-img-cancel').addEventListener('click', closeImg);

  // ---- единственная кнопка: Сохранить (и сразу опубликовать, если настроено) ----
  const b64 = (str) => btoa(unescape(encodeURIComponent(str)));
  $('gg-save').addEventListener('click', async () => {
    saveDraft();
    if (!PUBLISH.token){ markClean(); toast('Сохранено'); return; }
    const btn = $('gg-save'); const old = btn.textContent; btn.textContent = 'Сохраняю…'; btn.disabled = true;
    try {
      const [owner, repo] = PUBLISH.repo.split('/');
      const api = `https://api.github.com/repos/${owner}/${repo}/contents/${PUBLISH.path}`;
      const headers = { 'Authorization': 'token ' + PUBLISH.token, 'Accept': 'application/vnd.github+json' };
      let sha; const g = await fetch(`${api}?ref=${encodeURIComponent(PUBLISH.branch)}`, { headers });
      if (g.ok){ sha = (await g.json()).sha; }
      const body = { message: 'content: правки через редактор', content: b64(JSON.stringify(GG.content, null, 2)), branch: PUBLISH.branch, ...(sha ? { sha } : {}) };
      const r = await fetch(api, { method:'PUT', headers, body: JSON.stringify(body) });
      if (!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.message || ('HTTP ' + r.status)); }
      markClean();
      toast('Сохранено ✓ сайт обновится за ~1 минуту');
    } catch(err){
      toast('Сохранено локально. Публикация не удалась: ' + err.message);
    } finally {
      btn.textContent = old; btn.disabled = false;
    }
  });

  $('gg-reset').addEventListener('click', () => {
    if (!confirm('Отменить несохранённые правки и вернуть текущую версию сайта?')) return;
    localStorage.removeItem('gg_draft');
    location.reload();
  });

  // hooks used by app.js editing
  window.GGAdmin = { _dirty: () => { saveDraft(); markDirty(); }, _pickImage: openImg };
  window.addEventListener('beforeunload', (e) => { if (dirty){ e.preventDefault(); e.returnValue = ''; } });

  GG.boot({ admin:true }).then(markClean);
})();
</script>
</body>
</html>
